<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloudflare DNS Checker & Chat - Ryan</title>
  <style>
body: JSON.stringify({
  messages: [],  // empty array, no comma after
  lastResult: lastResult ? { ...lastResult } : null
})
  </style>
</head>
<body>
  <div class="left">
    <h1>Cloudflare DNS & Load Checker</h1>
    <p>Enter domain—see real DNS & speed. Chat on right for help.</p>
    
    <input type="text" id="domainInput" placeholder="example.com" />
    <button onclick="analyzeDomain()">Analyze</button>
    
    <p style="color:#666; font-size:0.9em;">Cloudflare DoH + browser timing—edge magic.</p>

    <table id="logTable">
      <thead>
        <tr>
          <th>Time</th>
          <th>Domain</th>
          <th>DNS</th>
          <th>Load</th>
          <th>Issuer</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>

  <div class="right">
    <h2>Chat with Cloudflare Expert</h2>
    <div id="chatBox"></div>
    <div style="display:flex; gap:10px;">
      <input type="text" id="chatInput" placeholder="Ask or analyze..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    let lastResult = null;

    async function getAuthoritativeNS(domain) {
      domain = domain.replace(/^https?:\/\//, '').replace(/\/$/, '');
      const dohUrl = `https://cloudflare-dns.com/dns-query?name=${domain}&type=NS`;
      try {
        const res = await fetch(dohUrl, { headers: { 'Accept': 'application/dns-json' } });
        const json = await res.json();
        if (json.Status !== 0 || !json.Answer) return { nameservers: 'Error', class: 'direct' };
        const nsList = json.Answer.filter(r => r.type === 2).map(r => r.data.replace(/\.$/, ''));
        const isCloudflare = nsList.some(ns => ns.toLowerCase().includes('cloudflare.com'));
        return {
          nameservers: nsList.join(', ') || 'None',
          class: isCloudflare ? 'cloudflare' : 'direct'
        };
      } catch (e) {
        return { nameservers: 'Fetch failed', class: 'direct' };
      }
    }

    async function analyzeDomain(domainFromInput = null) {
      let domain = domainFromInput || document.getElementById('domainInput').value.trim();
      if (!domain) return alert('Enter a domain!');
      if (!domain.startsWith('http://') && !domain.startsWith('https://')) domain = 'https://' + domain;

      const now = new Date();
      const timestamp = now.toLocaleTimeString('en-US', { timeZone: 'America/Chicago' }) + ' CST';

      const nsInfo = await getAuthoritativeNS(domain);

      const start = performance.now();
      await fetch(domain, { method: 'GET', mode: 'no-cors', redirect: 'follow' }).catch(() => {});
      const loadTime = (performance.now() - start).toFixed(0) + ' ms';

      const issuer = nsInfo.class === 'cloudflare' ? 'Cloudflare Inc' : "Let's Encrypt / Varies";

      const row = document.createElement('tr');
      row.innerHTML = `
        <td class="timestamp">${timestamp}</td>
        <td>${domain.replace(/^https?:\/\//, '')}</td>
        <td class="${nsInfo.class}">${nsInfo.nameservers}</td>
        <td>${loadTime}</td>
        <td>${issuer}</td>
      `;
      document.getElementById('logBody').appendChild(row);
      document.getElementById('logTable').scrollIntoView({ behavior: 'smooth', block: 'end' });

      lastResult = {
        domain: domain.replace(/^https?:\/\//, ''),
        ns: nsInfo.nameservers,
        class: nsInfo.class,
        load: loadTime,
        issuer
      };
    }

    // Enter for domain input
    document.getElementById('domainInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        analyzeDomain();
      }
    });

    // Chat setup
    const chatBox = document.getElementById('chatBox');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, isUser = false) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'bot'}`;
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Initial greeting
    addMessage("Hey! I'm your Cloudflare helper. Analyze a domain or ask about DNS/speed.");

sendBtn.onclick = async () => {
  const text = chatInput.value.trim();
  if (!text) return;
  addMessage(text, true);
  chatInput.value = '';

  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [],
      lastResult: lastResult ? { ...lastResult } : null
    })
  });

  if (!response.ok) {
    addMessage("Chat error—check Worker logs?", false);
    return;
  }

  const reader = response.body.getReader();
  let botReply = '';
  const botMsg = document.createElement('div');
  botMsg.className = 'message bot';
  chatBox.appendChild(botMsg);

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    const chunk = new TextDecoder().decode(value);
    const parts = chunk.split(/\s+/).filter(Boolean);
    for (const part of parts) {
      try {
        const json = JSON.parse(part);
        if (json.response) {
          botReply += json.response;
          botMsg.textContent = botReply;
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      } catch (e) {
        // skip bad chunks
      }
    }
  }
};
  </script>
</body>
</html>
